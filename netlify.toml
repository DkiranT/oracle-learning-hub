[build]
  command = "npm --prefix frontend ci && npm --prefix frontend run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[context.production.environment]
  VITE_API_BASE_URL = "https://oracle-learning-hub.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
